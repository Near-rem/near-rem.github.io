<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Near Rem - O que eu dei?</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        .header-red { color: #ff0000; text-transform: uppercase; letter-spacing: 4px; font-weight: bold; margin-bottom: 30px; text-shadow: 0 0 10px #ff0000; }
        
        .data-box { 
            width: 100%; 
            max-width: 400px; 
            background: rgba(10, 10, 10, 0.9); 
            border: 1px solid #333; 
            padding: 20px; 
            border-radius: 5px; 
            box-shadow: inset 0 0 15px rgba(255, 0, 0, 0.1);
        }

        .data-line { margin-bottom: 12px; font-size: 14px; border-bottom: 1px solid #1a1a1a; padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        .label { color: #00FF00; text-transform: uppercase; }
        .value { color: #ff0000; font-weight: bold; text-align: right; word-break: break-all; margin-left: 10px; }

        .warning { color: #888; font-size: 11px; margin-top: 25px; text-align: center; max-width: 300px; line-height: 1.4; }
        .btn-back { margin-top: 30px; color: #fff; text-decoration: none; border: 1px solid #fff; padding: 10px 20px; border-radius: 5px; transition: 0.3s; font-size: 13px; }
        .btn-back:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <h2 class="header-red">DADOS COLETADOS</h2>

    <div class="data-box">
        <div class="data-line"><span class="label">IPv4:</span> <span id="ip" class="value">Buscando...</span></div>
        <div class="data-line"><span class="label">Provedor:</span> <span id="isp" class="value">Buscando...</span></div>
        <div class="data-line"><span class="label">Local:</span> <span id="loc" class="value">Buscando...</span></div>
        <div class="data-line"><span class="label">Sistema:</span> <span id="os" class="value">...</span></div>
        <div class="data-line"><span class="label">Browser:</span> <span id="brw" class="value">...</span></div>
        <div class="data-line"><span class="label">Tela:</span> <span id="res" class="value">...</span></div>
        <div class="data-line"><span class="label">Bateria:</span> <span id="bat" class="value">...</span></div>
    </div>

    <p class="warning">VOCÊ NÃO "DEU" NADA. O SEU NAVEGADOR APENAS ENTREGOU O QUE EU SOLICITEI.</p>

    <a href="index.html" class="btn-back">VOLTAR AO SISTEMA</a>

    <script>
        async function coletar() {
            // 1. Coleta de IP, ISP e Localização usando ipwho.is (Compatível com HTTPS)
            try {
                const response = await fetch('https://ipwho.is/');
                const data = await response.json();
                
                if(data.success) {
                    document.getElementById('ip').innerText = data.ip;
                    document.getElementById('isp').innerText = data.connection.isp;
                    document.getElementById('loc').innerText = `${data.city}, ${data.region_code}`;
                } else {
                    document.getElementById('ip').innerText = "Bloqueado";
                }
            } catch (e) {
                document.getElementById('ip').innerText = "Erro na Captura";
                document.getElementById('isp').innerText = "Falha de Conexão";
                document.getElementById('loc').innerText = "Indisponível";
            }

            // 2. Hardware e Navegador
            const ua = navigator.userAgent;
            let os = "Desktop";
            if (/Android/i.test(ua)) os = "Android";
            else if (/iPhone|iPad|iPod/i.test(ua)) os = "iOS";
            else if (/Win/i.test(ua)) os = "Windows";
            else if (/Mac/i.test(ua)) os = "macOS";
            else if (/Linux/i.test(ua)) os = "Linux";
            
            let brw = "Browser";
            if (/Edge/i.test(ua)) brw = "Edge";
            else if (/Chrome/i.test(ua)) brw = "Chrome";
            else if (/Firefox/i.test(ua)) brw = "Firefox";
            else if (/Safari/i.test(ua)) brw = "Safari";

            document.getElementById('os').innerText = os;
            document.getElementById('brw').innerText = brw;
            document.getElementById('res').innerText = `${window.screen.width}x${window.screen.height}`;

            // 3. Bateria
            if (navigator.getBattery) {
                navigator.getBattery().then(function(battery) {
                    document.getElementById('bat').innerText = Math.round(battery.level * 100) + "%";
                });
            } else {
                document.getElementById('bat').innerText = "Privado";
            }
        }

        window.onload = coletar;
    </script>
</body>
</html>
