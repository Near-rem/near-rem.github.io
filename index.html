<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Near Rem - Core</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ffffff;
            --dim: rgba(255,255,255,0.08);
            --border: rgba(255,255,255,0.12);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            overflow: hidden;
            width: 100vw; height: 100vh;
            color: #fff;
            perspective: 1200px; /* Base para o 3D */
        }

        /* Background Fix */
        #canvas-bg { position: fixed; inset: 0; z-index: -2; pointer-events: none; }
        .grid-overlay { 
            position: fixed; inset: 0; z-index: -1; 
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        /* O Palco 3D */
        #scene {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .layer {
            position: relative;
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            pointer-events: none; /* Deixa passar clique para os filhos */
        }

        /* Foto com profundidade */
        .photo-wrap {
            position: relative;
            margin-bottom: 30px;
            transform: translateZ(80px); /* Salta da tela */
        }

        .photo-container {
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255,255,255,0.1);
        }

        .photo-container img { width: 100%; height: 100%; object-fit: cover; }

        h1 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 10px;
            margin-bottom: 20px;
            transform: translateZ(50px);
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .bio {
            font-family: 'Share Tech Mono', monospace;
            background: rgba(255,255,255,0.02);
            padding: 15px 30px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 35px;
            transform: translateZ(30px);
            backdrop-filter: blur(5px);
        }

        /* Botões com Hitbox Real */
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 320px;
            transform: translateZ(100px); /* Fica bem na frente */
            pointer-events: auto; /* IMPORTANTE: Habilita clique aqui */
        }

        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff;
            text-decoration: none;
            padding: 18px;
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            transition: 0.3s;
            pointer-events: auto; /* Garante que o botão seja clicável */
            cursor: pointer;
        }

        .btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: #fff;
            transform: scale(1.05) translateZ(20px); /* Efeito de pop ao passar o mouse */
        }

        .scanlines { position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px); pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div class="grid-overlay"></div>
    <div class="scanlines"></div>

    <div id="scene">
        
        <div class="layer">
            <div class="photo-wrap">
                <div class="photo-container">
                    <img src="=https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/a2f7c9d8-a913-4273-847f-705be41395df/da61r89-10eafa98-1292-47fe-86f4-0690a95fc681.gif?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7InBhdGgiOiIvZi9hMmY3YzlkOC1hOTEzLTQyNzMtODQ3Zi03MDViZTQxMzk1ZGYvZGE2MXI4OS0xMGVhZmE5OC0xMjkyLTQ3ZmUtODZmNC0wNjkwYTk1ZmM2ODEuZ2lmIn1dXSwiYXVkIjpbInVybjpzZXJ2aWNlOmZpbGUuZG93bmxvYWQiXX0.GpJnJyaxOTYBAQXaDWDSOyBth_nsIpV0OC6kYy6ioaQ">
                </div>
            </div>

            <h1>Near Rem</h1>

            <div class="bio">
                SESSÃO › <span id="glitch">---</span><br>
                IP › <span id="user-ip">...</span>
            </div>

            <div class="button-container">
                <a href="contatos.html" class="btn"><span>Meus Contatos</span> <span>›</span></a>
                <a href="hacks.html" class="btn"><span>Arsenal</span> <span>›</span></a>
                <a href="sobre.html" class="btn"><span>Sobre Mim</span> <span>›</span></a>
                <a href="dados.html" class="btn"><span>Beta</span> <span>›</span></a>
            </div>
        </div>

    </div>

    <script>
        // Parallax 3D Real
        const scene = document.getElementById('scene');
        let tX = 0, tY = 0, cX = 0, cY = 0;

        document.addEventListener('mousemove', e => {
            tX = (e.clientX - window.innerWidth/2) / (window.innerWidth/2);
            tY = (e.clientY - window.innerHeight/2) / (window.innerHeight/2);
        });

        function animate() {
            cX += (tX - cX) * 0.1;
            cY += (tY - cY) * 0.1;
            
            // Aqui a mágica: rotaciona o palco inteiro no espaço 3D
            scene.style.transform = `rotateY(${cX * 15}deg) rotateX(${-cY * 15}deg)`;
            requestAnimationFrame(animate);
        }
        animate();

        // Glitch e IP
        setInterval(() => {
            document.getElementById('glitch').textContent = Math.random().toString(16).slice(2, 8).toUpperCase();
        }, 100);

        fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => {
            document.getElementById('user-ip').textContent = d.ip;
        });

        // Partículas Simples
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let w, h;
        const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
        window.addEventListener('resize', resize);
        resize();

        const dots = Array.from({length: 50}, () => ({ x: Math.random()*w, y: Math.random()*h, v: Math.random()*0.5 }));
        function drawDots() {
            ctx.clearRect(0,0,w,h);
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            dots.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, 1, 0, 7); ctx.fill();
                d.y -= d.v; if(d.y < 0) d.y = h;
            });
            requestAnimationFrame(drawDots);
        }
        drawDots();
    </script>
</body>
</html>
