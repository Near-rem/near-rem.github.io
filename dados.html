<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RADIOLINK — Frequência Secreta</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* MUDANÇA PARA ROXO */
    --cyan: #bc13fe; /* Roxo Neon */
    --green: #d896ff; /* Roxo Claro */
    --amber: #f0abff;
    --red: #ff3366;
    --bg: #0a0510;
    --bg2: #120a1d;
    --bg3: #1a0f2b;
    --panel: rgba(188, 19, 254, 0.04);
    --border: rgba(188, 19, 254, 0.15);
    --border2: rgba(188, 19, 254, 0.35);
    --text: #e8b0ff;
    --textmuted: #6a4a88;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    overflow: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* ── GRID BACKGROUND ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(188, 19, 254, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(188, 19, 254, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.97); }

  #screen-enter { gap: 0; }
  .logo-area { text-align: center; margin-bottom: 48px; position: relative; }

  .logo-ring {
    width: 140px;
    height: 140px;
    margin: 0 auto 24px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* GIF NO LUGAR DO EMOJI */
  .inner-gif {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    z-index: 2;
    border: 2px solid var(--cyan);
    box-shadow: 0 0 20px var(--cyan);
    object-fit: cover;
  }

  .logo-ring svg { position: absolute; inset: 0; width: 100%; height: 100%; animation: spin-slow 12s linear infinite; }
  @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .logo-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 900;
    letter-spacing: 0.2em;
    color: var(--cyan);
    text-shadow: 0 0 20px rgba(188, 19, 254, 0.8);
  }

  .logo-sub { font-size: 11px; letter-spacing: 0.5em; color: var(--textmuted); margin-top: 8px; text-transform: uppercase; }

  .signal-waves { position: absolute; inset: -40px; pointer-events: none; z-index: -1; }
  .signal-waves span { position: absolute; inset: 0; border: 1px solid var(--cyan); border-radius: 50%; animation: wave-expand 3s ease-out infinite; opacity: 0; }
  @keyframes wave-expand { 0% { transform: scale(0.3); opacity: 0.8; } 100% { transform: scale(2); opacity: 0; } }

  /* Frequency input panel */
  .freq-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 40px 48px;
    width: min(480px, 90vw);
    position: relative;
  }

  #freq-input {
    width: 100%;
    background: rgba(188, 19, 254, 0.06);
    border: 1px solid var(--border2);
    padding: 16px 20px;
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    color: var(--cyan);
    text-align: center;
    outline: none;
    text-shadow: 0 0 20px rgba(188, 19, 254, 0.5);
  }

  .btn-connect {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 1px solid var(--cyan);
    font-family: 'Orbitron', monospace;
    color: var(--cyan);
    cursor: pointer;
    font-weight: 700;
    letter-spacing: 0.4em;
    margin-top: 20px;
  }

  .btn-connect:hover { background: rgba(188, 19, 254, 0.1); box-shadow: 0 0 30px rgba(188, 19, 254, 0.2); }

  /* ── CHAT ── */
  #screen-chat { padding: 0; justify-content: stretch; flex-direction: column; }
  .chat-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--bg2); }
  .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
  
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg-bubble {
    padding: 12px 18px;
    background: rgba(188, 19, 254, 0.1);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
    white-space: pre-wrap; /* Mantém formatação de código */
    max-width: 90%;
  }

  .msg-wrap.mine { align-self: flex-end; }
  .msg-wrap.theirs { align-self: flex-start; }

  /* ÁREA DE INPUT SEM LIMITE */
  .input-area { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--bg2); display: flex; gap: 12px; }
  #msg-input {
    flex: 1;
    background: rgba(188, 19, 254, 0.04);
    border: 1px solid var(--border);
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    outline: none;
  }

  .btn-send {
    padding: 12px 20px;
    background: var(--cyan);
    border: none;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    color: #000;
    cursor: pointer;
  }

  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(188, 19, 254, 0.01) 2px, rgba(188, 19, 254, 0.01) 4px);
    pointer-events: none;
    z-index: 999;
  }

  .toast { position: fixed; top: 20px; right: 20px; padding: 10px 20px; background: var(--bg3); border: 1px solid var(--cyan); color: var(--cyan); transform: translateX(150%); transition: 0.3s; z-index: 2000; }
  .toast.show { transform: translateX(0); }
</style>
</head>
<body>

<div class="scanlines"></div>

<div class="screen" id="screen-enter">
  <div class="logo-area">
    <div class="logo-ring">
      <div class="signal-waves"><span></span><span></span><span></span></div>
      <svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="56" stroke="rgba(188,19,254,0.3)" fill="none"/></svg>
      <img src="https://64.media.tumblr.com/a3f87ab649160476b7ccf1133901f631/f3416c2782181375-13/s250x400/5f70efa2ad20e71d66e769d3da6089f522545c23.gifv" class="inner-gif">
    </div>
    <div class="logo-title">RADIOLINK</div>
    <div class="logo-sub">Frequência Roxa · Sem Limites</div>
  </div>

  <div class="freq-panel">
    <input type="text" id="freq-input" placeholder="FREQUÊNCIA" autocomplete="off">
    <button class="btn-connect" onclick="connect()">SINTONIZAR</button>
    <div id="status-msg" style="text-align:center; margin-top:10px; font-size:12px;"></div>
  </div>
</div>

<div class="screen hidden" id="screen-wait">
    <div class="logo-ring">
        <img src="https://64.media.tumblr.com/a3f87ab649160476b7ccf1133901f631/f3416c2782181375-13/s250x400/5f70efa2ad20e71d66e769d3da6089f522545c23.gifv" class="inner-gif" style="width:120px; height:120px;">
    </div>
    <div style="font-family:'Orbitron'; font-size:40px; color:var(--cyan)" id="display-freq">#000</div>
    <div style="color:var(--amber); letter-spacing:2px;">AGUARDANDO SINAL...</div>
    <button onclick="location.reload()" style="background:none; border:none; color:var(--textmuted); cursor:pointer; margin-top:20px;">[ CANCELAR ]</button>
</div>

<div class="screen hidden" id="screen-chat">
  <div class="chat-header">
    <div style="display:flex; align-items:center; gap:10px;">
      <div class="conn-dot"></div>
      <span id="chat-freq-label" style="font-family:'Orbitron'; color:var(--cyan)">#000</span>
    </div>
    <button onclick="location.reload()" style="background:none; border:1px solid var(--border); color:var(--text); padding:5px 10px; cursor:pointer;">SAIR</button>
  </div>

  <div class="messages-area" id="messages-area"></div>

  <div class="input-area">
    <textarea id="msg-input" placeholder="Cole seu código ou mensagem aqui..." rows="1" style="resize:none; height:45px;"></textarea>
    <button class="btn-send" onclick="sendMsg()">ENVIAR</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let peer = null;
let conn = null;
let currentFreq = '';

const $ = id => document.getElementById(id);

function showScreen(id) {
  ['screen-enter','screen-wait','screen-chat'].forEach(s => $(s).classList.toggle('hidden', s !== id));
}

function showToast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function connect() {
  const raw = $('freq-input').value.trim();
  if (!raw) return;
  currentFreq = raw.toUpperCase();
  const peerId = 'radiolink-purple-' + currentFreq;

  peer = new Peer(peerId);

  peer.on('open', () => {
    $('display-freq').textContent = '#' + currentFreq;
    showScreen('screen-wait');
    peer.on('connection', c => { conn = c; setup(); });
  });

  peer.on('error', err => {
    if (err.type === 'unavailable-id') {
      peer.destroy();
      join(peerId);
    }
  });
}

function join(id) {
  peer = new Peer();
  peer.on('open', () => {
    conn = peer.connect(id);
    conn.on('open', () => { setup(); });
  });
}

function setup() {
  showScreen('screen-chat');
  $('chat-freq-label').textContent = '#' + currentFreq;
  showToast("CONEXÃO ESTABELECIDA");
  conn.on('data', data => appendMsg(data, 'theirs'));
}

function sendMsg() {
  const input = $('msg-input');
  const text = input.value;
  if (!text || !conn) return;
  conn.send(text);
  appendMsg(text, 'mine');
  input.value = '';
}

function appendMsg(text, type) {
  const area = $('messages-area');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + type;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}

// Enter para enviar (Shift+Enter para pular linha já que é textarea)
$('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMsg();
    }
});
</script>
</body>
</html>
