<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda - Near Rem</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #0a0a0a;
            --accent: #00e5b0;
            --gold: #f5c842;
            --ink: #e8e2ff;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            user-select: none;
        }

        /* HUD */
        .hud {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            font-family: 'Space Mono', monospace;
            background: var(--card-bg);
            padding: 15px 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .stat span { color: var(--gold); font-weight: bold; font-size: 1.2em; }

        /* GRID DA FAZENDA */
        .farm-grid {
            display: grid;
            grid-template-columns: repeat(3, 110px);
            gap: 20px;
            margin-bottom: 40px;
        }

        .plot {
            width: 110px;
            height: 110px;
            background: #080808;
            border: 1px solid #1a1a1a;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .plot:hover { border-color: var(--accent); background: #0f0f0f; transform: translateY(-2px); }

        /* Estados da Planta */
        .plot-icon { font-size: 24px; margin-bottom: 5px; transition: 0.3s; }
        .plot-status { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #444; }

        .plot.growing { cursor: wait; border-style: solid; border-color: #333; }
        .plot.ready { 
            border-color: var(--gold); 
            background: rgba(245, 200, 66, 0.05);
            animation: pulse-ready 1.5s infinite;
        }
        @keyframes pulse-ready {
            0% { box-shadow: 0 0 0px rgba(245, 200, 66, 0); }
            50% { box-shadow: 0 0 15px rgba(245, 200, 66, 0.2); }
            100% { box-shadow: 0 0 0px rgba(245, 200, 66, 0); }
        }

        /* INVENTÁRIO */
        .inventory-section { margin-bottom: 40px; width: 100%; max-width: 400px; text-align: center; }
        .btn-inv {
            background: #111;
            border: 1px solid var(--border);
            color: var(--ink);
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            transition: 0.3s;
        }
        .btn-inv:hover { border-color: var(--accent); color: var(--accent); }
        .inventory-panel {
            background: #080808;
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            display: none;
        }

        /* LOJA */
        .shop-section {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
        }
        .shop-items { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .item-card {
            background: #000;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 140px;
            text-align: center;
        }
        .buy-btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .buy-btn:disabled { background: #222; color: #555; cursor: not-allowed; }

    </style>
</head>
<body>

    <div class="hud">
        <div class="stat">🪙 Moedas: <span id="coin-display">0</span></div>
    </div>

    <div class="farm-grid" id="farm-grid">
        </div>

    <div class="inventory-section">
        <button class="btn-inv" onclick="ui.toggleInventory()">MOSTRAR INVENTÁRIO</button>
        <div id="inventory-panel" class="inventory-panel">
            <div style="font-family: 'Space Mono'; font-size: 12px;">
                🌾 Sementes de Trigo: <span id="inv-seeds" style="color: var(--accent);">0</span>
            </div>
        </div>
    </div>

    <div class="shop-section">
        <h3 style="text-align: center; font-family: 'Space Mono'; color: var(--accent);">MARKETPLACE</h3>
        <div class="shop-items">
            <div class="item-card">
                <div style="font-size: 24px;">🌾</div>
                <strong>Trigo</strong>
                <div style="color: var(--gold); font-size: 14px; margin: 5px 0;">Cost: 5</div>
                <button class="buy-btn" onclick="game.buySeed('trigo')">COMPRAR</button>
            </div>
            <div class="item-card" style="opacity: 0.3;">
                <div style="font-size: 24px;">☕</div>
                <strong>Café</strong>
                <div style="color: var(--gold); font-size: 14px; margin: 5px 0;">Cost: 15</div>
                <button class="buy-btn" disabled>BLOQUEADO</button>
            </div>
        </div>
    </div>

<script>
    const game = (function() {
        let state = {
            coins: 20,
            seeds: 3,
            plots: Array(6).fill(null).map(() => ({ status: 'empty', timer: null }))
        };

        const config = {
            trigo: { buy: 5, sell: 12, time: 5000 } // 5 segundos
        };

        function save() {
            // Aqui você poderia salvar no localStorage se quisesse
            render();
        }

        function render() {
            document.getElementById('coin-display').innerText = state.coins;
            document.getElementById('inv-seeds').innerText = state.seeds;
            
            const grid = document.getElementById('farm-grid');
            grid.innerHTML = '';

            state.plots.forEach((plot, index) => {
                const div = document.createElement('div');
                div.className = `plot ${plot.status}`;
                div.onclick = () => handlePlotClick(index);

                let icon = '🟫';
                let label = 'Vazio';

                if (plot.status === 'growing') {
                    icon = '🌱';
                    label = 'Crescendo...';
                } else if (plot.status === 'ready') {
                    icon = '🌾';
                    label = 'Colher!';
                }

                div.innerHTML = `
                    <div class="plot-icon">${icon}</div>
                    <div class="plot-status">${label}</div>
                `;
                grid.appendChild(div);
            });
        }

        function handlePlotClick(index) {
            const plot = state.plots[index];

            if (plot.status === 'empty' && state.seeds > 0) {
                state.seeds--;
                plot.status = 'growing';
                render();

                setTimeout(() => {
                    plot.status = 'ready';
                    render();
                }, config.trigo.time);
            } 
            else if (plot.status === 'ready') {
                plot.status = 'empty';
                state.coins += config.trigo.sell;
                render();
            }
        }

        return {
            buySeed: function(type) {
                if (state.coins >= config[type].buy) {
                    state.coins -= config[type].buy;
                    state.seeds++;
                    render();
                }
            },
            init: () => render()
        };
    })();

    const ui = {
        toggleInventory: () => {
            const panel = document.getElementById('inventory-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }
    };

    game.init();
</script>

</body>
</html>
