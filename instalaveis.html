<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Near Rem - Sistemas Locais</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 50px 20px; margin: 0; min-height: 100vh;
        }

        .photo-container { 
            width: 130px; height: 130px; 
            border-radius: 50%; 
            border: 2px solid #8a2be2; 
            overflow: hidden; 
            margin-bottom: 20px; 
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.4); 
        }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 22px; color: #fff; margin: 0; letter-spacing: 4px; text-transform: uppercase; font-weight: 300; }
        .subtitle { color: #8a2be2; font-family: monospace; font-size: 13px; margin: 10px 0 40px 0; }

        .button-container { width: 100%; max-width: 350px; }

        .btn { 
            background-color: #0d0d0d; 
            border: 1px solid #222; 
            color: #ccc; 
            text-decoration: none; 
            display: block; 
            padding: 16px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            text-align: center; 
            font-weight: bold; 
            transition: 0.2s; 
            cursor: pointer; 
            text-transform: uppercase;
            font-size: 11px;
        }
        .btn:hover { border-color: #8a2be2; color: #fff; background-color: #111; }

        .btn-back { color: #555; text-decoration: none; margin-top: 30px; font-size: 13px; font-family: monospace; display: block; text-align: center; }
        .btn-back:hover { color: #8a2be2; }

        #overlay { 
            display: none; 
            position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.9); 
            z-index: 999; 
        }

        #tool-popup { 
            display: none; 
            position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background-color: #050505; 
            border: 2px solid #8a2be2; 
            padding: 25px; 
            z-index: 1000; 
            text-align: center; 
            width: 80%; max-width: 320px;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.3);
            border-radius: 12px;
        }

        #popup-title { 
            color: #8a2be2; 
            font-size: 14px; 
            margin-bottom: 20px; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-family: monospace;
        }
        
        .popup-link {
            display: block; 
            background: #111; 
            border: 1px solid #333; 
            color: #fff; 
            padding: 12px; 
            margin-bottom: 10px; 
            text-decoration: none; 
            font-size: 13px; 
            font-family: monospace;
            transition: 0.2s;
            border-radius: 6px;
        }
        .popup-link:hover { background: #8a2be2; color: #000; border-color: #fff; }
        
        .close-btn { 
            margin-top: 15px; 
            color: #888; 
            font-size: 11px; 
            cursor: pointer; 
            text-transform: uppercase; 
            text-decoration: underline;
        }
        .close-btn:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="photo-container">
        <img src="https://64.media.tumblr.com/7a1a7ea33336dd28f1a0499be9534afb/f3416c2782181375-af/s250x400/95007b9ca7746a231306ff4cfed6c088df67d664.gifv">
    </div>

    <h1>Sistemas Locais</h1>
    <div class="subtitle">LOCAL_STATION_ENV</div>

    <div class="button-container">
        <div class="btn" onclick="openTool('Monitoramento & OS', [
            {n:'Process Explorer',u:'https://learn.microsoft.com/en-us/sysinternals/downloads/process-explorer'},
            {n:'Wireshark',u:'https://www.wireshark.org/'},
            {n:'Autoruns',u:'https://learn.microsoft.com/en-us/sysinternals/downloads/autoruns'}
        ])">Monitoramento & OS</div>

        <div class="btn" onclick="openTool('Redes & Wireless', [
            {n:'Nmap',u:'https://nmap.org/'},
            {n:'Angry IP Scanner',u:'https://angryip.org/'},
            {n:'Bettercap',u:'https://www.bettercap.org/'},
            {n:'Kismet',u:'https://www.kismetwireless.net/'}
        ])">Redes & Wireless</div>

        <div class="btn" onclick="openTool('Análise & Forense', [
            {n:'Ghidra (NSA Tool)',u:'https://ghidra-sre.org/'},
            {n:'Autopsy',u:'https://www.autopsy.com/'},
            {n:'Sherlock',u:'https://github.com/sherlock-project/sherlock'},
            {n:'Maltego',u:'https://www.maltego.com/'}
        ])">Análise & Forense</div>

        <div class="btn" onclick="openTool('Recon & Automação', [
            {n:'Nuclei (Scanner)',u:'https://github.com/projectdiscovery/nuclei'},
            {n:'Subfinder',u:'https://github.com/projectdiscovery/subfinder'},
            {n:'FFUF (Fuzzer)',u:'https://github.com/ffuf/ffuf'},
            {n:'Katana (Crawler)',u:'https://github.com/projectdiscovery/katana'}
        ])">Recon & Automação</div>

        <div class="btn" onclick="openTool('Web & DB', [
            {n:'Burp Suite',u:'https://portswigger.net/'},
            {n:'Sqlmap',u:'https://sqlmap.org/'},
            {n:'OWASP ZAP',u:'https://www.zaproxy.org/'},
            {n:'Nikto',u:'https://github.com/sullo/nikto'},
            {n:'Dalfox (XSS)',u:'https://github.com/hahwul/dalfox'}
        ])">Web & Banco de Dados</div>

        <div class="btn" onclick="openTool('Exploração & Crypto', [
            {n:'Metasploit',u:'https://www.metasploit.com/'},
            {n:'Hashcat',u:'https://hashcat.net/'},
            {n:'John the Ripper',u:'https://www.openwall.com/john/'},
            {n:'BeEF',u:'https://beefproject.com/'},
            {n:'Zphisher',u:'https://github.com/htr-tech/zphisher'}
        ])">Exploração & Crypto</div>

        <div class="btn" onclick="openTool('Privacidade & OS', [
            {n:'Tor Browser',u:'https://www.torproject.org/'},
            {n:'Whonix OS',u:'https://www.whonix.org/'},
            {n:'Tails OS',u:'https://tails.net/'}
        ])">Privacidade & OS</div>
        
        <a href="hacks.html" class="btn-back">← Voltar</a>
    </div>

    <div id="overlay" onclick="closeTool()"></div>
    <div id="tool-popup">
        <div id="popup-title">--- SELECIONAR ---</div>
        <div id="popup-links-container"></div>
        <div class="close-btn" onclick="closeTool()">[ fechar ]</div>
    </div>

    <script>
        function openTool(title, links) {
            const container = document.getElementById('popup-links-container');
            document.getElementById('popup-title').innerText = title;
            container.innerHTML = ''; 
            links.forEach(link => {
                const a = document.createElement('a');
                a.href = link.u; a.target = '_blank'; a.className = 'popup-link';
                a.innerText = '> ' + link.n;
                container.appendChild(a);
            });
            document.getElementById('tool-popup').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }
        function closeTool() {
            document.getElementById('tool-popup').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
