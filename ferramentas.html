<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Near Rem - Arsenal</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 30px 15px; margin: 0; min-height: 100vh; }
        .photo-container { width: 110px; height: 110px; border-radius: 50%; border: 2px solid #00f2ff; overflow: hidden; margin-bottom: 15px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-size: 18px; color: #fff; margin: 0; letter-spacing: 4px; text-transform: uppercase; font-weight: 300; }
        .subtitle { color: #00f2ff; font-family: monospace; font-size: 10px; margin: 5px 0 25px 0; letter-spacing: 1px; }
        .button-container { width: 100%; max-width: 400px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { background-color: #0d0d0d; border: 1px solid #222; color: #ccc; padding: 12px 4px; border-radius: 6px; text-align: center; font-size: 10px; font-weight: 600; transition: 0.3s; cursor: pointer; display: flex; align-items: center; justify-content: center; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { border-color: #00f2ff; color: #fff; background-color: #111; transform: translateY(-2px); }
        .btn-full { grid-column: span 2; margin-top: 10px; opacity: 0.5; border: 1px dashed #444; text-decoration: none; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); z-index: 999; }
        #tool-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; border: 1px solid #00f2ff; padding: 20px; z-index: 1000; text-align: center; border-radius: 15px; width: 85%; max-width: 320px; }
        #popup-title { color: #00f2ff; font-size: 13px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .popup-link { display: block; background: #151515; border: 1px solid #222; color: #fff; padding: 10px; margin-bottom: 8px; text-decoration: none; border-radius: 6px; font-size: 12px; font-family: monospace; transition: 0.2s; }
        .popup-link:hover { background: #00f2ff; color: #000; font-weight: bold; }
        .close-btn { margin-top: 10px; color: #ff4d4d; font-size: 10px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="photo-container"><img src="https://64.media.tumblr.com/5cab77a299d2902fb7dae22ffca6800d/f3416c2782181375-a5/s250x400/b6c03af6e062d404f86f4b8c388a9435b9452b37.gifv"></div>
    <h1>Arsenal</h1>
    <div class="subtitle">ULTIMATE_CORE_V8</div>
    <div class="button-container">
        <div class="btn" onclick="openTool('Threat Intel', [{n:'Maltego',u:'https://www.maltego.com/'},{n:'SpiderFoot',u:'https://www.spiderfoot.net/'},{n:'Babel Street',u:'https://www.babelstreet.com/'},{n:'Recon-ng',u:'https://github.com/lanmaster53/recon-ng'},{n:'Censys Search',u:'https://search.censys.io/'}])">Threat Intel</div>
        <div class="btn" onclick="openTool('Darknet', [{n:'Daniel\'s Onion',u:'https://onion.danwin1210.de/'},{n:'Dread Forum',u:'https://dread.com/'},{n:'SecureDrop',u:'https://securedrop.org/'},{n:'ZeroBin',u:'https://zerobin.org/'}])">Darknet</div>
        <div class="btn" onclick="openTool('Judicial', [{n:'Jusbrasil',u:'https://www.jusbrasil.com.br/'},{n:'Escavador',u:'https://www.escavador.com/'},{n:'CNJ PJe',u:'https://www.cnj.jus.br/pje/'}])">Judicial</div>
        <div class="btn" onclick="openTool('Telefonia', [{n:'Consulta Operadora',u:'http://consultaoperadora.com.br/site2015/'},{n:'Qual Empresa Chamou',u:'https://www.qualempresamechamou.com.br/'}])">Telefonia</div>
        <div class="btn" onclick="openTool('IP Tracking', [{n:'IP-API',u:'https://ip-api.com/'},{n:'IPWhois',u:'https://ipwho.is/'},{n:'Iplogger',u:'https://iplogger.org/'},{n:'Site24x7 IP',u:'https://www.site24x7.com/pt/tools/localizar-ip.html'},{n:'WHTop Tools',u:'https://www.whtop.com/pt/tools.ip'}])">IP Tracking</div>
        <div class="btn" onclick="openTool('Host & Geo', [{n:'KingHost GeoIP',u:'https://king.host/wiki/geoip/'},{n:'Shodan.io',u:'https://www.shodan.io'}])">Host & Geo</div>
        <div class="btn" onclick="openTool('Dados / CEP', [{n:'CEP.la',u:'https://cep.la/'},{n:'ViaCEP',u:'https://viacep.com.br/'},{n:'Brasil API',u:'https://brasilapi.com.br/'},{n:'4Devs (Gerador)',u:'https://www.4devs.com.br/'}])">Dados / CEP</div>
        <div class="btn" onclick="openTool('E-mail Temp', [{n:'Temp Mail',u:'https://temp-mail.org/pt/'},{n:'Tempail',u:'https://tempail.com/pt/'},{n:'10 Minute Mail',u:'https://10minutemail.com/'}])">E-mail Temp</div>
        <div class="btn" onclick="openTool('Dorks & OSINT', [{n:'DorkSearch',u:'https://dorksearch.pro'},{n:'OSINT.rocks',u:'https://osint.rocks'},{n:'OSINT Framework',u:'https://osintframework.com/'}])">Dorks/OSINT</div>
        <div class="btn" onclick="openTool('Deep Search (+18)', [{n:'Coomer.su',u:'https://coomer.su/'},{n:'Kemono.su',u:'https://kemono.su/'}])">Deep Search</div>
        <div class="btn" onclick="openTool('Scanners', [{n:'VirusTotal',u:'https://www.virustotal.com/'},{n:'Hybrid Analysis',u:'https://www.hybrid-analysis.com/'}])">Malware</div>
        <div class="btn" onclick="openTool('Vazamentos', [{n:'HaveIBeenPwned',u:'https://haveibeenpwned.com/'},{n:'IntelX',u:'https://intelx.io/'}])">Vazamentos</div>
        <a href="hacks.html" class="btn btn-full">← Voltar ao Menu</a>
    </div>
    <div id="overlay" onclick="closeTool()"></div>
    <div id="tool-popup"><div id="popup-title">Selecionar Link</div><div id="popup-links-container"></div><div class="close-btn" onclick="closeTool()">[ FECHAR ]</div></div>
    <script>
        function openTool(title, links) {
            const container = document.getElementById('popup-links-container');
            document.getElementById('popup-title').innerText = title;
            container.innerHTML = ''; 
            links.forEach(link => {
                const a = document.createElement('a');
                a.href = link.u; a.target = '_blank'; a.className = 'popup-link';
                a.innerText = '>> ' + link.n;
                container.appendChild(a);
            });
            document.getElementById('tool-popup').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }
        function closeTool() { document.getElementById('tool-popup').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    </script>
</body>
</html>
