<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Near Rem - Sistemas Locais</title>
    <style>
        body { 
            background-color: #050005; /* Fundo roxo quase preto */
            color: #d1d1d1; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 40px 20px; margin: 0; min-height: 100vh;
        }

        /* Container da foto com gradiente Vermelho e Roxo */
        .photo-container { 
            width: 120px; height: 120px; border-radius: 50%; 
            border: 2px solid #b30000; overflow: hidden; margin-bottom: 15px; 
            box-shadow: 0 0 20px rgba(179, 0, 0, 0.4), 0 0 10px rgba(138, 43, 226, 0.4); 
            background: #000;
        }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }

        h1 { 
            font-size: 20px; 
            color: #fff; 
            margin: 0; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            font-weight: 300;
            text-shadow: 2px 2px #b30000, -1px -1px #8a2be2; /* Efeito Glitch sutil */
        }
        .subtitle { 
            color: #8a2be2; /* Roxo Neon */
            font-family: monospace; font-size: 11px; margin: 8px 0 30px 0; 
            letter-spacing: 2px; text-transform: uppercase;
        }

        .button-container { width: 100%; max-width: 380px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Botões com transição entre borda Roxa e Vermelha */
        .btn { 
            background-color: #0a0a0a; 
            border: 1px solid #2d004d; /* Borda roxa escura */
            color: #a0a0a0; 
            padding: 15px 5px; border-radius: 8px; text-align: center; 
            font-size: 10px; font-weight: 600; transition: 0.4s; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            text-transform: uppercase; letter-spacing: 1px;
        }
        
        .btn:hover { 
            border-color: #ff00ff; /* Roxo Neon ao passar o mouse */
            color: #fff; 
            background-color: #12001a; 
            transform: translateY(-2px); 
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2), 0 0 5px rgba(255, 0, 0, 0.2);
        }
        
        .btn-full { 
            grid-column: span 2; margin-top: 15px; opacity: 0.6; 
            border: 1px dashed #b30000; text-decoration: none; color: #b30000;
        }
        .btn-full:hover { border-color: #ff0000; color: #fff; background: #200000; }

        /* Pop-up Customizado Roxo/Vermelho */
        #overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); z-index: 999; 
        }

        #tool-popup { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #050005; border: 1px solid #8a2be2; padding: 25px; z-index: 1000; 
            text-align: center; border-radius: 20px; width: 85%; max-width: 320px;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.2);
        }

        #popup-title { color: #8a2be2; font-size: 14px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        .popup-link {
            display: block; background: #0e0014; border: 1px solid #33004d; color: #fff; 
            padding: 12px; margin-bottom: 10px; text-decoration: none; border-radius: 8px;
            font-size: 13px; font-family: monospace; transition: 0.2s;
        }
        .popup-link:hover { 
            background: linear-gradient(90deg, #8a2be2, #b30000); 
            color: #fff; font-weight: bold; border-color: #fff;
        }
        
        .close-btn { margin-top: 15px; color: #555; font-size: 11px; cursor: pointer; text-transform: uppercase; }
        .close-btn:hover { color: #ff00ff; }
    </style>
</head>
<body>

    <div class="photo-container">
        <img src="https://64.media.tumblr.com/7a1a7ea33336dd28f1a0499be9534afb/f3416c2782181375-af/s250x400/95007b9ca7746a231306ff4cfed6c088df67d664.gifv">
    </div>

    <h1>Sistemas Locais</h1>
    <div class="subtitle">NEON_STATION_OVERRIDE</div>

    <div class="button-container">
        
        <div class="btn" onclick="openTool('Redes & Sniffing', [
            {n: 'Nmap (Scanner)', u: 'https://nmap.org/download.html'},
            {n: 'Wireshark (Sniffer)', u: 'https://www.wireshark.org/'},
            {n: 'Bettercap', u: 'https://www.bettercap.org/'},
            {n: 'Ettercap', u: 'https://www.ettercap-project.org/'}
        ])">Redes & Sniffing</div>

        <div class="btn" onclick="openTool('Pentest Web', [
            {n: 'Burp Suite', u: 'https://portswigger.net/burp/communitydownload'},
            {n: 'OWASP ZAP', u: 'https://www.zaproxy.org/'},
            {n: 'Nikto', u: 'https://github.com/sullo/nikto'},
            {n: 'Sqlmap', u: 'https://sqlmap.org/'}
        ])">Pentest Web</div>

        <div class="btn" onclick="openTool('Análise & OSINT', [
            {n: 'Maltego (Soft)', u: 'https://www.maltego.com/downloads/'},
            {n: 'SpiderFoot CLI', u: 'https://github.com/smicallef/spiderfoot'},
            {n: 'Sherlock (User)', u: 'https://github.com/sherlock-project/sherlock'},
            {n: 'Autopsy (Forense)', u: 'https://www.autopsy.com/'}
        ])">Forense & OSINT</div>

        <div class="btn" onclick="openTool('Quebra de Senha', [
            {n: 'John the Ripper', u: 'https://www.openwall.com/john/'},
            {n: 'Hashcat', u: 'https://hashcat.net/hashcat/'},
            {n: 'Hydra', u: 'https://github.com/vanhauser-thc/thc-hydra'}
        ])">Bruteforce</div>

        <div class="btn" onclick="openTool('Anonimato Local', [
            {n: 'Tor Browser', u: 'https://www.torproject.org/'},
            {n: 'ProxyChains', u: 'https://github.com/rofl0r/proxychains-ng'},
            {n: 'Whonix OS', u: 'https://www.whonix.org/'}
        ])">Anonimato</div>

        <div class="btn" onclick="openTool('Exploração', [
            {n: 'Metasploit', u: 'https://www.metasploit.com/'},
            {n: 'BeEF Framework', u: 'https://beefproject.com/'},
            {n: 'Aircrack-ng', u: 'https://www.aircrack-ng.org/'}
        ])">Exploração</div>

        <a href="hacks.html" class="btn btn-full">← Voltar ao Terminal</a>
    </div>

    <div id="overlay" onclick="closeTool()"></div>
    <div id="tool-popup">
        <div id="popup-title">Acessar Software</div>
        <div id="popup-links-container"></div>
        <div class="close-btn" onclick="closeTool()">[ Desconectar ]</div>
    </div>

    <script>
        function openTool(title, links) {
            const container = document.getElementById('popup-links-container');
            document.getElementById('popup-title').innerText = title;
            container.innerHTML = ''; 
            links.forEach(link => {
                const a = document.createElement('a');
                a.href = link.u; a.target = '_blank'; a.className = 'popup-link';
                a.innerText = '>> ' + link.n;
                container.appendChild(a);
            });
            document.getElementById('tool-popup').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }
        function closeTool() {
            document.getElementById('tool-popup').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
