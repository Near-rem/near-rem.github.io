<script>
        // Observe as vírgulas no final de cada linha agora:
        const lines = [
            "> Carregando dados...",
            "> Usuário: Near Rem",
            "> Status: Online",
            "> Conhecimentos: HTML, CSS, JavaScript, Python, Java, PHP, C, C++, C#, React, Lua, SQL e outras.",
            "> Dados: Humilde o suficiente para saber que sou descartável. Bom o suficiente para saber que será um downgrade.",
            "> OBS: Seus dados já foram colhidos assim que você clicou no link."
        ];

        let lineIndex = 0;
        let charIndex = 0;
        const target = document.getElementById("terminal-content");

        function typeWriter() {
            if (lineIndex < lines.length) {
                if (charIndex < lines[lineIndex].length) {
                    target.innerHTML += lines[lineIndex].charAt(charIndex);
                    charIndex++;
                    setTimeout(typeWriter, 40); 
                } else {
                    target.innerHTML += "<br>"; 
                    lineIndex++;
                    charIndex = 0;
                    setTimeout(typeWriter, 500); 
                }
            }
        }

        window.onload = typeWriter;
    </script>
