<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Near Rem - Arsenal</title>
    <style>
        body { 
            background-color: #000; color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 40px 20px; margin: 0; min-height: 100vh;
        }

        .photo-container { 
            width: 120px; height: 120px; border-radius: 50%; 
            border: 2px solid #00f2ff; overflow: hidden; margin-bottom: 15px; 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); 
        }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 20px; color: #fff; margin: 0; letter-spacing: 4px; text-transform: uppercase; font-weight: 300; }
        .subtitle { color: #00f2ff; font-family: monospace; font-size: 11px; margin: 5px 0 30px 0; letter-spacing: 1px; }

        .button-container { width: 100%; max-width: 360px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn { 
            background-color: #0d0d0d; border: 1px solid #222; color: #ccc; 
            padding: 14px 5px; border-radius: 8px; text-align: center; 
            font-size: 11px; font-weight: 500; transition: 0.3s; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:hover { border-color: #00f2ff; color: #fff; background-color: #111; transform: translateY(-2px); }
        
        .btn-full { grid-column: span 2; margin-top: 10px; opacity: 0.6; border: 1px dashed #444; }

        /* Pop-up Glassmorphism */
        #overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); z-index: 999; 
        }

        #tool-popup { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #0a0a0a; border: 1px solid #00f2ff; padding: 25px; z-index: 1000; 
            text-align: center; border-radius: 20px; width: 85%; max-width: 320px;
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #popup-title { color: #00f2ff; font-size: 14px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        .popup-link {
            display: block; background: #151515; border: 1px solid #222; color: #fff; 
            padding: 12px; margin-bottom: 10px; text-decoration: none; border-radius: 8px;
            font-size: 13px; font-family: monospace; transition: 0.2s;
        }
        .popup-link:hover { background: #00f2ff; color: #000; font-weight: bold; }
        
        .close-btn { margin-top: 15px; color: #ff4d4d; font-size: 11px; cursor: pointer; text-transform: uppercase; }

        @keyframes slideUp { from { opacity: 0; transform: translate(-50%, -40%); } to { opacity: 1; transform: translate(-50%, -50%); } }
    </style>
</head>
<body>

    <div class="photo-container">
        <img src="https://64.media.tumblr.com/5cab77a299d2902fb7dae22ffca6800d/f3416c2782181375-a5/s250x400/b6c03af6e062d404f86f4b8c388a9435b9452b37.gifv">
    </div>

    <h1>Arsenal</h1>
    <div class="subtitle">DATA_INTEL_SYSTEM_V5</div>

    <div class="button-container">
        <div class="btn" onclick="openTool('Justiça & Tel', [
            {n: 'Jusbrasil', u: 'https://www.jusbrasil.com.br/consulta-processual/'},
            {n: 'Escavador (Preciso)', u: 'https://www.escavador.com/'},
            {n: 'CNJ (Processos)', u: 'https://www.cnj.jus.br/pje/'},
            {n: 'Consulta Operadora', u: 'http://consultaoperadora.com.br/site2015/'},
            {n: 'Qual Empresa Chamou', u: 'https://www.qualempresamechamou.com.br/'}
        ])">Judicial & Tel</div>

        <div class="btn" onclick="openTool('Dados & CEP', [
            {n: 'CEP.la', u: 'https://cep.la/'},
            {n: 'ViaCEP', u: 'https://viacep.com.br/'},
            {n: '4Devs (Gerador)', u: 'https://www.4devs.com.br/gerador_de_cpf'}
        ])">Dados & CEP</div>

        <div class="btn" onclick="openTool('Localizar IP', [
            {n: 'IP-API', u: 'https://ip-api.com/'},
            {n: 'IPWhois', u: 'https://ipwho.is/'},
            {n: 'Iplogger', u: 'https://iplogger.org/'}
        ])">Localizar IP</div>

        <div class="btn" onclick="openTool('Host & GeoIP', [
            {n: 'KingHost GeoIP', u: 'https://king.host/wiki/geoip/'},
            {n: 'Site24x7 Loc', u: 'https://www.site24x7.com/pt/tools/localizar-ip.html'},
            {n: 'WHTop Tools', u: 'https://www.whtop.com/pt/tools.ip'}
        ])">Host & GeoIP</div>

        <div class="btn" onclick="openTool('Dorks & Infra', [
            {n: 'DorkSearch', u: 'https://dorksearch.pro'},
            {n: 'Shodan.io', u: 'https://www.shodan.io'},
            {n: 'OSINT.rocks', u: 'https://osint.rocks'}
        ])">Dorks & Infra</div>

        <div class="btn" onclick="openTool('E-mail Temp', [
            {n: 'Temp Mail', u: 'https://temp-mail.org/pt/'},
            {n: 'Tempail', u: 'https://tempail.com/pt/'},
            {n: '10 Minute Mail', u: 'https://10minutemail.com/'}
        ])">E-mail Temp</div>

        <div class="btn" onclick="openTool('OSINT', [
            {n: 'HaveIBeenPwned', u: 'https://haveibeenpwned.com/'},
            {n: 'OSINT Framework', u: 'https://osintframework.com/'},
            {n: 'IntelX', u: 'https://intelx.io/'}
        ])">OSINT Geral</div>

        <div class="btn" onclick="openTool('Deep Search (+18)', [
            {n: 'Coomer.su', u: 'https://coomer.su/'},
            {n: 'Kemono.su', u: 'https://kemono.su/'}
        ])">Deep Search</div>

        <div class="btn" onclick="openTool('Malware', [
            {n: 'VirusTotal', u: 'https://www.virustotal.com/'},
            {n: 'Hybrid Analysis', u: 'https://www.hybrid-analysis.com/'}
        ])">Scanners</div>

        <a href="hacks.html" class="btn btn-full">← Voltar ao Menu</a>
    </div>

    <div id="overlay" onclick="closeTool()"></div>
    <div id="tool-popup">
        <div id="popup-title">Selecionar Link</div>
        <div id="popup-links-container"></div>
        <div class="close-btn" onclick="closeTool()">[ Desconectar ]</div>
    </div>

    <script>
        function openTool(title, links) {
            const container = document.getElementById('popup-links-container');
            document.getElementById('popup-title').innerText = title;
            container.innerHTML = ''; 
            links.forEach(link => {
                const a = document.createElement('a');
                a.href = link.u; a.target = '_blank'; a.className = 'popup-link';
                a.innerText = '>> ' + link.n;
                container.appendChild(a);
            });
            document.getElementById('tool-popup').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }
        function closeTool() {
            document.getElementById('tool-popup').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
