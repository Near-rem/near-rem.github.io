<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Near Rem - Core</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --border: rgba(255,255,255,0.12); }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            width: 100vw;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
            perspective: 1200px; /* Perspectiva no body para o palco funcionar */
        }

        #canvas-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        .grid-overlay {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .scanlines {
            position: fixed; inset: 0; pointer-events: none; z-index: 100;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
        }

        .vignette {
            position: fixed; inset: 0; pointer-events: none; z-index: 1;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.75) 100%);
        }

        #scene {
            position: relative; z-index: 2;
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 50px 20px;
            transform-style: preserve-3d;
            will-change: transform;
            transition: transform 0.1s ease-out; /* Suaviza a parada no mobile */
        }

        /* Classe para desativar 3D no mobile */
        #scene.no-3d {
            transform: none !important;
            transform-style: flat !important;
        }

        /* ── Foto ── */
        .photo-wrap { position: relative; margin-bottom: 28px; }

        .photo-ring {
            position: absolute; inset: -10px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.18);
            animation: spin 8s linear infinite;
            pointer-events: none;
        }

        .photo-ring::before {
            content: '';
            position: absolute; top: -3px; left: 50%;
            transform: translateX(-50%);
            width: 6px; height: 6px;
            background: #fff; border-radius: 50%;
            box-shadow: 0 0 8px #fff, 0 0 20px #fff;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .photo-container {
            width: 140px; height: 140px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255,255,255,0.15);
            background: #111;
        }

        .photo-container img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* ── Título ── */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(16px, 5vw, 26px);
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        /* ── Bio ── */
        .bio {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 35px;
            text-align: center;
            line-height: 2;
            width: 100%; max-width: 340px;
        }

        #user-ip { color: #fff; font-weight: bold; }

        /* ── Botões ── */
        .button-container {
            display: flex; flex-direction: column;
            gap: 14px; width: 100%; max-width: 340px;
        }

        .btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            color: #fff;
            text-decoration: none;
            padding: 18px 22px;
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; cursor: pointer;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.5);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255,255,255,0.08);
        }

        .btn:active { transform: scale(0.98); }

        .footer-tag {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; color: rgba(255,255,255,0.15);
            letter-spacing: 3px; margin-top: 40px;
        }

        @media (max-width: 480px) {
            h1 { letter-spacing: 4px; }
            .photo-container { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div class="grid-overlay"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div id="scene">
        <div class="photo-wrap">
            <div class="photo-ring"></div>
            <div class="photo-container">
                <img src="https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/a2f7c9d8-a913-4273-847f-705be41395df/da61r89-10eafa98-1292-47fe-86f4-0690a95fc681.gif?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7InBhdGgiOiIvZi9hMmY3YzlkOC1hOTEzLTQyNzMtODQ3Zi03MDViZTQxMzk1ZGYvZGE2MXI4OS0xMGVhZmE5OC0xMjkyLTQ3ZmUtODZmNC0wNjkwYTk1ZmM2ODEuZ2lmIn1dXSwiYXVkIjpbInVybjpzZXJ2aWNlOmZpbGUuZG93bmxvYWQiXX0.GpJnJyaxOTYBAQXaDWDSOyBth_nsIpV0OC6kYy6ioaQ" alt="Near">
            </div>
        </div>

        <h1>Near Rem</h1>

        <div class="bio">
            SESSÃO › <span id="glitch">---</span><br>
            IP › <span id="user-ip">...</span>
        </div>

        <div class="button-container">
            <a href="contatos.html" class="btn"><span>Meus Contatos</span><span>›</span></a>
            <a href="hacks.html"   class="btn"><span>Arsenal</span><span>›</span></a>
            <a href="sobre.html"   class="btn"><span>Sobre Mim</span><span>›</span></a>
            <a href="dados.html"   class="btn"><span>Beta</span><span>›</span></a>
        </div>

        <div class="footer-tag">> CORE_SYSTEM_V3</div>
    </div>

    <script>
    const scene = document.getElementById('scene');
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    let W, H, dots = [];

    // Detecção de Mobile/Touch
    const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    if (isTouch) {
        scene.classList.add('no-3d');
    }

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', () => { resize(); initDots(); });

    function initDots() {
        const n = Math.min(Math.floor(W * H / 14000), 80);
        dots = Array.from({ length: n }, () => ({
            x:  Math.random() * W, y:  Math.random() * H,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            r:  Math.random() * 1.2 + 0.4,
            a:  Math.random() * 0.4 + 0.1
        }));
    }
    initDots();

    function drawDots() {
        ctx.clearRect(0, 0, W, H);
        for (let i = 0; i < dots.length; i++) {
            for (let j = i + 1; j < dots.length; j++) {
                const dx = dots[i].x - dots[j].x;
                const dy = dots[i].y - dots[j].y;
                const d  = Math.sqrt(dx*dx + dy*dy);
                if (d < 110) {
                    ctx.beginPath();
                    ctx.moveTo(dots[i].x, dots[i].y);
                    ctx.lineTo(dots[j].x, dots[j].y);
                    ctx.strokeStyle = `rgba(255,255,255,${0.07 * (1 - d/110)})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }
        dots.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${p.a})`;
            ctx.fill();
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
            if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        });
        requestAnimationFrame(drawDots);
    }
    drawDots();

    /* ── Parallax 3D (Apenas PC) ── */
    let tX = 0, tY = 0, cX = 0, cY = 0;

    if (!isTouch) {
        document.addEventListener('mousemove', e => {
            tX = (e.clientX - W / 2) / (W / 2);
            tY = (e.clientY - H / 2) / (H / 2);
        });

        function animateScene() {
            cX += (tX - cX) * 0.08;
            cY += (tY - cY) * 0.08;
            scene.style.transform = `rotateY(${cX * 14}deg) rotateX(${-cY * 14}deg)`;
            requestAnimationFrame(animateScene);
        }
        animateScene();
    }

    // Glitch e IP
    setInterval(() => {
        document.getElementById('glitch').textContent = Math.random().toString(16).slice(2, 10).toUpperCase();
    }, 80);

    fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(d => document.getElementById('user-ip').textContent = d.ip)
        .catch(() => document.getElementById('user-ip').textContent = 'PROTEGIDO');
    </script>
</body>
</html>
