<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Near Rem - Hacks</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px 20px; margin: 0; }
        
        /* Container da foto com brilho vermelho */
        .photo-container { 
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            border: 2px solid #ff0000; 
            overflow: hidden; 
            margin-bottom: 20px; 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); 
        }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        
        h1 { font-size: 24px; color: #ff0000; margin: 0; letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 0 10px rgba(255, 0, 0, 0.5); }
        .bio { color: #00FF00; font-family: monospace; font-size: 14px; margin: 15px 0 30px 0; }
        
        .button-container { width: 100%; max-width: 350px; }
        .btn { background-color: #1A1A1A; border: 1px solid #444; color: #fff; text-decoration: none; display: block; padding: 18px; border-radius: 12px; margin-bottom: 15px; text-align: center; font-weight: bold; transition: 0.3s; cursor: pointer; }
        .btn:hover { border-color: #ff0000; background-color: #220000; transform: scale(1.02); }
        
        .btn-back { color: #888; text-decoration: none; margin-top: 20px; font-size: 14px; }
        .btn-back:hover { color: #fff; }

        /* Pop-up */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; }
        #custom-alert { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: #050505; border: 2px solid #ff0000; padding: 30px; z-index: 1000; text-align: center; border-radius: 15px; box-shadow: 0 0 30px rgba(255, 0, 0, 0.7); width: 80%; max-width: 300px; }
        
        /* Foto dentro do Pop-up */
        .popup-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid #ff0000;
            margin-bottom: 15px;
            object-fit: cover;
        }

        #custom-alert h2 { color: #ff0000; margin-top: 0; font-size: 20px; letter-spacing: 1px; }
        #custom-alert p { font-family: monospace; color: #fff; font-size: 14px; margin-bottom: 25px; }
        #custom-alert button { background: #ff0000; border: none; color: #fff; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="overlay"></div>
    <div id="custom-alert">
        <img src="https://64.media.tumblr.com/f380a22bf69fe739c0416842071884ce/f3416c2782181375-fd/s400x600/12d3933f586a206c0de01257a4568d836dbfb024.gifv" class="popup-photo">
        <h2>ACESSO NEGADO</h2>
        <p>> Erro: 0x8004005<br>> Código de segurança não aprovado!</p>
        <button onclick="fecharPopUp()">OK</button>
    </div>

    <div class="photo-container">
        <img src="https://i.makeagif.com/media/10-02-2016/A4wmZs.gif" alt="Near Rem">
    </div>

    <h1>Hacks</h1>
    <div class="bio">Acesso: <span id="glitch"></span></div>

    <div class="button-container">
        <a href="https://discord.gg/kDJCpD8kch" target="_blank" class="btn">Servidor sem rastro</a>
        <div class="btn" onclick="abrirPopUp()">❌ Sem autorização ❌</div>
        <div class="btn" onclick="abrirPopUp()">❌ Sem autorização ❌</div>
        <a href="index.html" class="btn-back">← Voltar</a>
    </div>

    <script>
        function abrirPopUp() {
            document.getElementById('custom-alert').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }
        function fecharPopUp() {
            document.getElementById('custom-alert').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
        const chars = '0123456789ABCDEF';
        const glitchElement = document.getElementById('glitch');
        setInterval(() => {
            let result = '';
            for (let i = 0; i < 8; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
            glitchElement.innerText = 'Nvl_Demo_ID-' + result;
        }, 1);
    </script>
</body>
</html>
