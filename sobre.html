<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Near Rem - Sobre</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px 20px; margin: 0; }
        .photo-container { width: 120px; height: 120px; border-radius: 60px; border: 2px solid #00FF00; overflow: hidden; margin-bottom: 20px; box-shadow: 0 0 15px rgba(0, 255, 0, 0.3); }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-size: 22px; color: #00FF00; margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        
        .terminal-box { 
            width: 100%; 
            max-width: 350px; 
            background-color: #0a0a0a; 
            border: 1px solid #00FF00; 
            padding: 20px; 
            border-radius: 8px; 
            margin: 20px 0;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.8;
            color: #00FF00;
            min-height: 250px;
        }

        .cursor { display: inline-block; width: 8px; height: 15px; background: #00FF00; margin-left: 5px; animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .button-container { width: 100%; max-width: 350px; }
        .btn { background-color: #1A1A1A; border: 1px solid #333; color: #fff; text-decoration: none; display: block; padding: 18px; border-radius: 12px; margin-bottom: 15px; text-align: center; font-weight: bold; transition: 0.3s; cursor: pointer; }
        .btn:hover { border-color: #00FF00; background-color: #002200; }
        
        .btn-delete:hover { border-color: #ff0000; background-color: #2b0000; color: #ff0000; }

        .btn-back { color: #888; text-decoration: none; margin-top: 20px; font-size: 14px; }

        /* Pop-up de Erro */
        #popup-negado {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background-color: #000000;
            border: 2px solid #ff0000;
            padding: 25px;
            z-index: 1000;
            text-align: center;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
            width: 85%;
            max-width: 300px;
        }

        /* Foto dentro do Pop-up */
        .popup-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #ff0000;
            margin-bottom: 15px;
            object-fit: cover;
        }

        #popup-negado h2 { color: #ff0000; margin-top: 0; font-size: 20px; }
        #popup-negado p { font-size: 14px; margin-bottom: 20px; font-weight: bold; color: #ccc; }
        #popup-negado button { background: #ff0000; border: none; color: #fff; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 999;
        }
    </style>
</head>
<body>

    <div id="overlay"></div>
    <div id="popup-negado">
        <img src="https://64.media.tumblr.com/c4ec718efde48186f6661ff3c6b108d0/f3416c2782181375-90/s400x600/0acf943f4485e20e6a8e59292910ab8f6ff59abd.gifv" class="popup-photo">
        
        <h2>AÇÃO NEGADA!</h2>
        <p>Mas não se preocupe...<br>você não é tão importante assim.</p>
        <button onclick="fecharPopup()">FECHAR</button>
    </div>

    <div class="photo-container">
        <img src="https://64.media.tumblr.com/a1ccce290f6302c53aaa1cfa302fed5e/f3416c2782181375-9b/s250x400/f9a89983b59cee443b6c50d81c614cc926dab844.gifv">
    </div>

    <h1>System Profile</h1>

    <div class="terminal-box">
        <span id="terminal-content"></span><span class="cursor"></span>
    </div>

    <div class="button-container">
        <div class="btn btn-delete" onclick="abrirPopup()">Delete meus dados coletados</div>
        <a href="index.html" class="btn-back">← Voltar</a>
    </div>

    <script>
        function abrirPopup() {
            document.getElementById('popup-negado').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function fecharPopup() {
            document.getElementById('popup-negado').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        const lines = [
            "> Carregando dados...",
            "> Usuário: Near Rem",
            "> Status: Online",
            "> Conhecimentos: HTML, CSS, JavaScript, Python, Java, PHP, C, C++, C#, React, Lua, SQL e outras.",
            "> Dados: Humilde o suficiente para saber que sou descartável. Bom o suficiente para saber que será um downgrade.",
            "> OBS: Seus dados já foram colhidos assim que você clicou no link."
        ];

        let lineIndex = 0;
        let charIndex = 0;
        const target = document.getElementById("terminal-content");

        function typeWriter() {
            if (lineIndex < lines.length) {
                if (charIndex < lines[lineIndex].length) {
                    target.innerHTML += lines[lineIndex].charAt(charIndex);
                    charIndex++;
                    setTimeout(typeWriter, 40); 
                } else {
                    target.innerHTML += "<br>"; 
                    lineIndex++;
                    charIndex = 0;
                    setTimeout(typeWriter, 500); 
                }
            }
        }

        window.onload = typeWriter;
    </script>
</body>
</html>
