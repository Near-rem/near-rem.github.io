<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Rem — Temporário & Seguro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #12101a;
  --bg2:      #1a1726;
  --bg3:      #221f30;
  --surface:  #2a2640;
  --surfl:    rgba(120,100,200,0.08);
  --border:   rgba(160,140,220,0.12);
  --border2:  rgba(160,140,220,0.28);
  --accent:   #a78bfa;
  --accent2:  #c4b5fd;
  --mint:     #6ee7b7;
  --rose:     #fb7185;
  --amber:    #fbbf24;
  --text:     #d4cef0;
  --muted:    #6b6490;
  --mine-bg:  rgba(124,58,237,0.18);
  --mine-bd:  rgba(167,139,250,0.3);
  --mine-txt: #c4b5fd;
  --their-bg: rgba(16,185,129,0.1);
  --their-bd: rgba(110,231,183,0.25);
  --their-txt:#6ee7b7;
}

html, body { height: 100%; background: var(--bg); font-family: 'Syne', sans-serif; color: var(--text); overflow: hidden; }

.aurora { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.aurora-blob { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.12; animation:aurora-drift var(--dur,18s) ease-in-out infinite alternate; }
.aurora-blob:nth-child(1){width:500px;height:500px;top:-100px;left:-100px;background:radial-gradient(circle,#7c3aed,transparent);--dur:20s}
.aurora-blob:nth-child(2){width:400px;height:400px;bottom:-80px;right:-80px;background:radial-gradient(circle,#0d9488,transparent);--dur:15s}
.aurora-blob:nth-child(3){width:300px;height:300px;top:40%;left:50%;background:radial-gradient(circle,#4f46e5,transparent);--dur:22s}
@keyframes aurora-drift { from{transform:translate(0,0) scale(1)} to{transform:translate(40px,30px) scale(1.1)} }

.grid-bg { position:fixed; inset:0; z-index:0; pointer-events:none; background-image: linear-gradient(rgba(160,140,220,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(160,140,220,0.03) 1px,transparent 1px); background-size:48px 48px; }

.screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10; transition:opacity 0.5s ease,transform 0.5s ease; }
.screen.hidden { opacity:0; pointer-events:none; transform:scale(0.96) translateY(8px); }

/* ── TELA 1 ── */
#screen-enter { gap:0; }

.orb-wrap { width:140px; height:140px; margin:0 auto 28px; position:relative; transform-style:preserve-3d; animation:orb-float 6s ease-in-out infinite; }
@keyframes orb-float { 0%,100%{transform:rotateX(8deg) rotateY(-8deg) translateY(0)} 50%{transform:rotateX(-8deg) rotateY(8deg) translateY(-12px)} }

.orb { width:100%; height:100%; border-radius:50%; background:radial-gradient(circle at 35% 35%, rgba(167,139,250,0.5) 0%, rgba(109,40,217,0.3) 40%, rgba(15,12,28,0.8) 80%); box-shadow:0 0 0 1px rgba(167,139,250,0.2),0 0 40px rgba(124,58,237,0.25),0 20px 60px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-size:44px; position:relative; }
.orb::before { content:''; position:absolute; top:12%; left:20%; width:40%; height:25%; background:radial-gradient(ellipse,rgba(255,255,255,0.15),transparent); border-radius:50%; transform:rotate(-20deg); }

.orb-ring { position:absolute; inset:-16px; border-radius:50%; border:1px solid rgba(167,139,250,0.15); animation:ring-spin 10s linear infinite; }
.orb-ring::after { content:''; position:absolute; width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 12px var(--accent); top:50%; left:-4px; transform:translateY(-50%); }
.orb-ring-2 { position:absolute; inset:-28px; border-radius:50%; border:1px dashed rgba(167,139,250,0.08); animation:ring-spin 18s linear infinite reverse; }
@keyframes ring-spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

.particle { position:absolute; width:3px; height:3px; border-radius:50%; background:var(--accent); opacity:0; animation:particle-float var(--d,4s) ease-in-out infinite; animation-delay:var(--dl,0s); }
@keyframes particle-float { 0%{opacity:0;transform:translate(var(--sx,0px),var(--sy,0px)) scale(0)} 30%{opacity:0.8} 100%{opacity:0;transform:translate(var(--ex,20px),var(--ey,-40px)) scale(1.5)} }

.logo-title { font-size:clamp(30px,7vw,56px); font-weight:800; letter-spacing:-0.02em; background:linear-gradient(135deg,#e2d9ff 0%,var(--accent) 50%,var(--mint) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-align:center; line-height:1; }
.logo-sub { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.3em; color:var(--muted); text-align:center; margin-top:10px; margin-bottom:40px; text-transform:uppercase; }

.freq-panel { width:min(460px,92vw); background:linear-gradient(145deg,rgba(42,38,64,0.9),rgba(26,23,38,0.95)); border:1px solid var(--border2); border-radius:20px; padding:36px 40px; position:relative; box-shadow:0 0 0 1px rgba(255,255,255,0.04) inset,0 24px 80px rgba(0,0,0,0.5),0 0 60px rgba(124,58,237,0.08); transform:perspective(800px) rotateX(2deg); transition:transform 0.3s ease,box-shadow 0.3s ease; }
.freq-panel:hover { transform:perspective(800px) rotateX(0deg); box-shadow:0 0 0 1px rgba(255,255,255,0.06) inset,0 32px 100px rgba(0,0,0,0.5),0 0 80px rgba(124,58,237,0.12); }
.freq-panel::before { content:''; position:absolute; top:0; left:20%; right:20%; height:1px; background:linear-gradient(90deg,transparent,var(--accent),transparent); border-radius:50%; opacity:0.6; }

.panel-label { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.35em; color:var(--muted); text-transform:uppercase; margin-bottom:18px; display:flex; align-items:center; gap:10px; }
.panel-label::after { content:''; flex:1; height:1px; background:var(--border); }

.freq-input-wrap { position:relative; margin-bottom:14px; }
.freq-prefix { position:absolute; left:18px; top:50%; transform:translateY(-50%); font-family:'DM Mono',monospace; font-size:20px; color:var(--accent); font-weight:500; opacity:0.5; pointer-events:none; }
#freq-input { width:100%; background:rgba(167,139,250,0.06); border:1.5px solid var(--border2); border-radius:12px; padding:15px 20px 15px 52px; font-family:'DM Mono',monospace; font-size:26px; font-weight:500; color:var(--accent2); letter-spacing:0.25em; text-align:center; outline:none; transition:all 0.3s; caret-color:var(--mint); }
#freq-input:focus { border-color:var(--accent); background:rgba(167,139,250,0.1); box-shadow:0 0 0 4px rgba(124,58,237,0.12),0 0 30px rgba(124,58,237,0.08); }
#freq-input::placeholder { color:var(--muted); opacity:0.4; font-size:20px; letter-spacing:0.15em; }

.input-hint { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); text-align:center; margin-bottom:24px; letter-spacing:0.05em; }

.btn-connect { width:100%; padding:15px; background:linear-gradient(135deg,#7c3aed,#6d28d9); border:none; border-radius:12px; font-family:'Syne',sans-serif; font-size:15px; font-weight:700; letter-spacing:0.1em; color:#fff; cursor:pointer; position:relative; overflow:hidden; transition:all 0.25s; box-shadow:0 4px 0 #4c1d95,0 8px 20px rgba(109,40,217,0.4); transform:translateY(0); text-transform:uppercase; }
.btn-connect::before { content:''; position:absolute; top:0; left:0; right:0; height:50%; background:rgba(255,255,255,0.08); border-radius:12px 12px 0 0; }
.btn-connect:hover { background:linear-gradient(135deg,#8b5cf6,#7c3aed); box-shadow:0 4px 0 #4c1d95,0 12px 30px rgba(109,40,217,0.5); }
.btn-connect:active { transform:translateY(3px); box-shadow:0 1px 0 #4c1d95,0 4px 12px rgba(109,40,217,0.4); }

.status-msg { font-family:'DM Mono',monospace; font-size:11px; text-align:center; margin-top:14px; min-height:18px; letter-spacing:0.1em; transition:all 0.3s; }
.status-msg.error { color:var(--rose); }
.status-msg.info  { color:var(--amber); }

/* ── TELA 2 ── */
#screen-wait { gap:28px; }

.wait-container { display:flex; flex-direction:column; align-items:center; gap:24px; }
.wait-row { display:flex; gap:32px; align-items:center; flex-wrap:wrap; justify-content:center; }

.gif-frame { width:190px; height:250px; border-radius:20px; overflow:hidden; position:relative; box-shadow:0 0 0 1px rgba(167,139,250,0.2),0 20px 60px rgba(0,0,0,0.5),0 0 80px rgba(124,58,237,0.15); animation:gif-tilt 6s ease-in-out infinite alternate; flex-shrink:0; }
@keyframes gif-tilt { from{transform:perspective(600px) rotateY(-10deg) rotateX(5deg)} to{transform:perspective(600px) rotateY(10deg) rotateX(-5deg)} }
.gif-frame img { width:100%; height:100%; object-fit:cover; display:block; }
.gif-frame::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(167,139,250,0.1) 0%,transparent 60%); pointer-events:none; }

.freq-display-wait { text-align:center; }
.freq-display-label { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.45em; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
.freq-display-code { font-family:'DM Mono',monospace; font-size:clamp(36px,9vw,68px); font-weight:500; background:linear-gradient(135deg,#e2d9ff,var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:0.1em; animation:code-glow 3s ease-in-out infinite alternate; }
@keyframes code-glow { from{filter:drop-shadow(0 0 8px rgba(167,139,250,0.4))} to{filter:drop-shadow(0 0 20px rgba(167,139,250,0.7))} }

.wait-pulse { display:flex; align-items:center; gap:8px; font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:0.2em; text-transform:uppercase; margin-top:12px; }
.pulse-dot { width:6px; height:6px; border-radius:50%; background:var(--amber); box-shadow:0 0 8px var(--amber); animation:pulse-blink 1.2s ease-in-out infinite; }
@keyframes pulse-blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.7)} }

.waveform { display:flex; align-items:center; gap:3px; height:40px; }
.wave-bar { width:5px; background:linear-gradient(to top,rgba(124,58,237,0.3),var(--accent)); border-radius:3px; opacity:0.7; animation:wave-dance var(--d,0.8s) ease-in-out infinite alternate; min-height:4px; }
@keyframes wave-dance { from{height:var(--min-h,6px);opacity:0.3} to{height:var(--max-h,32px);opacity:1} }

.cancel-btn { font-family:'DM Mono',monospace; font-size:12px; letter-spacing:0.2em; color:var(--muted); background:none; border:1px solid var(--border); border-radius:8px; cursor:pointer; padding:8px 20px; transition:all 0.2s; text-transform:uppercase; }
.cancel-btn:hover { color:var(--rose); border-color:rgba(251,113,133,0.3); }

/* ── TELA 3 ── */
#screen-chat { padding:0; justify-content:stretch; }

.chat-header { display:flex; align-items:center; justify-content:space-between; padding:12px 18px; background:rgba(26,23,38,0.95); border-bottom:1px solid var(--border); flex-shrink:0; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
.chat-header-left { display:flex; align-items:center; gap:12px; }
.conn-avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,#7c3aed,#0d9488); display:flex; align-items:center; justify-content:center; font-size:18px; box-shadow:0 0 12px rgba(124,58,237,0.3); position:relative; flex-shrink:0; }
.conn-avatar::after { content:''; position:absolute; bottom:1px; right:1px; width:9px; height:9px; border-radius:50%; background:var(--mint); border:2px solid var(--bg2); box-shadow:0 0 6px var(--mint); }
.header-info { display:flex; flex-direction:column; }
.chat-freq-label { font-family:'DM Mono',monospace; font-size:14px; font-weight:500; color:var(--accent2); letter-spacing:0.1em; }
.chat-status-badge { font-family:'DM Mono',monospace; font-size:10px; color:var(--mint); letter-spacing:0.15em; text-transform:uppercase; }
.disconnect-btn { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.15em; color:var(--muted); background:none; border:1px solid var(--border); border-radius:8px; cursor:pointer; padding:7px 14px; transition:all 0.2s; text-transform:uppercase; }
.disconnect-btn:hover { color:var(--rose); border-color:rgba(251,113,133,0.3); }

.messages-area { flex:1; overflow-y:auto; padding:16px 14px; display:flex; flex-direction:column; gap:6px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
.messages-area::-webkit-scrollbar { width:4px; }
.messages-area::-webkit-scrollbar-track { background:transparent; }
.messages-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* WhatsApp bubbles */
.msg-wrap { display:flex; flex-direction:column; max-width:72%; animation:msg-pop 0.25s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes msg-pop { from{opacity:0;transform:scale(0.88) translateY(6px)} to{opacity:1;transform:scale(1) translateY(0)} }
.msg-wrap.mine   { align-self:flex-end; align-items:flex-end; }
.msg-wrap.theirs { align-self:flex-start; align-items:flex-start; }

.msg-meta { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-bottom:2px; letter-spacing:0.05em; padding:0 4px; }

.msg-bubble { padding:10px 14px; font-size:14px; line-height:1.55; word-break:break-word; position:relative; max-width:100%; }
.msg-wrap.mine   .msg-bubble { background:var(--mine-bg); border:1px solid var(--mine-bd); color:var(--mine-txt); border-radius:18px 4px 18px 18px; box-shadow:0 2px 12px rgba(124,58,237,0.15),0 0 0 1px rgba(255,255,255,0.03) inset; }
.msg-wrap.theirs .msg-bubble { background:var(--their-bg); border:1px solid var(--their-bd); color:var(--their-txt); border-radius:4px 18px 18px 18px; box-shadow:0 2px 12px rgba(13,148,136,0.12),0 0 0 1px rgba(255,255,255,0.02) inset; }

.msg-time { font-family:'DM Mono',monospace; font-size:10px; color:rgba(167,139,250,0.35); margin-top:2px; padding:0 4px; }
.msg-wrap.theirs .msg-time { color:rgba(110,231,183,0.35); }

.empty-chat { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; opacity:0.3; }
.empty-chat .icon { font-size:36px; }
.empty-chat p { font-family:'DM Mono',monospace; font-size:12px; letter-spacing:0.15em; color:var(--muted); text-transform:uppercase; }

.input-area { padding:10px 14px; border-top:1px solid var(--border); background:rgba(26,23,38,0.95); display:flex; gap:10px; align-items:center; flex-shrink:0; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
#msg-input { flex:1; background:rgba(120,100,200,0.08); border:1px solid var(--border); border-radius:22px; padding:11px 18px; font-family:'Syne',sans-serif; font-size:14px; color:var(--text); outline:none; transition:all 0.2s; caret-color:var(--accent); }
#msg-input:focus { border-color:var(--border2); background:rgba(167,139,250,0.08); }
#msg-input::placeholder { color:var(--muted); }

.btn-send { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#7c3aed,#6d28d9); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition:all 0.2s; flex-shrink:0; box-shadow:0 3px 10px rgba(109,40,217,0.4); }
.btn-send:hover { background:linear-gradient(135deg,#8b5cf6,#7c3aed); transform:scale(1.05); }
.btn-send:active { transform:scale(0.95); }

.corner-deco { position:fixed; width:50px; height:50px; z-index:5; pointer-events:none; }
.corner-deco.tl { top:16px;left:16px; border-top:1px solid var(--border2); border-left:1px solid var(--border2); border-radius:4px 0 0 0; }
.corner-deco.tr { top:16px;right:16px; border-top:1px solid var(--border2); border-right:1px solid var(--border2); border-radius:0 4px 0 0; }
.corner-deco.bl { bottom:16px;left:16px; border-bottom:1px solid var(--border2); border-left:1px solid var(--border2); border-radius:0 0 0 4px; }
.corner-deco.br { bottom:16px;right:16px; border-bottom:1px solid var(--border2); border-right:1px solid var(--border2); border-radius:0 0 4px 0; }

.toast { position:fixed; top:20px; right:20px; background:var(--bg3); border:1px solid rgba(167,139,250,0.3); border-radius:12px; padding:12px 18px; font-family:'DM Mono',monospace; font-size:12px; color:var(--accent2); letter-spacing:0.1em; z-index:2000; transform:translateX(120%); transition:transform 0.4s cubic-bezier(0.16,1,0.3,1); box-shadow:0 8px 32px rgba(0,0,0,0.3),0 0 0 1px rgba(255,255,255,0.04) inset; max-width:260px; }
.toast.show { transform:translateX(0); }
.toast.error-toast { border-color:rgba(251,113,133,0.3); color:var(--rose); }

.sys-msg { text-align:center; font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:0.2em; padding:6px 0; text-transform:uppercase; }

@media (max-width:480px) {
  .freq-panel { padding:24px 20px; }
  #freq-input { font-size:20px; }
  .msg-wrap { max-width:88%; }
  .corner-deco { display:none; }
  .gif-frame { width:150px; height:200px; }
  .wait-row { gap:20px; }
}
</style>
</head>
<body>

<div class="aurora">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>
<div class="grid-bg"></div>
<div class="corner-deco tl"></div>
<div class="corner-deco tr"></div>
<div class="corner-deco bl"></div>
<div class="corner-deco br"></div>

<!-- TELA 1 -->
<div class="screen" id="screen-enter">
  <div class="orb-wrap">
    <div class="orb-ring-2"></div>
    <div class="orb-ring"></div>
    <div class="orb-particles" id="orb-particles"></div>
    <div class="orb">👁️</div>
  </div>
  <div class="logo-title">Chat Rem</div>
  <div class="logo-sub">Temporário · Sem rastros · Agora</div>

  <div class="freq-panel">
    <div class="panel-label">Chave do chat</div>
    <div class="freq-input-wrap">
      <span class="freq-prefix">#</span>
      <input type="text" id="freq-input" maxlength="12" placeholder="000" autocomplete="off" spellcheck="false">
    </div>
    <div class="input-hint">Mesmo código nos dois dispositivos para conectar</div>
    <button class="btn-connect" onclick="connect()">▶ &nbsp; Conectar</button>
    <div class="status-msg" id="status-msg"></div>
  </div>
</div>

<!-- TELA 2 -->
<div class="screen hidden" id="screen-wait">
  <div class="wait-container">
    <div class="wait-row">
      <div class="gif-frame">
        <img src="https://64.media.tumblr.com/a3f87ab649160476b7ccf1133901f631/f3416c2782181375-13/s250x400/5f70efa2ad20e71d66e769d3da6089f522545c23.gifv" alt="waiting">
      </div>
      <div class="freq-display-wait">
        <div class="freq-display-label">Chave ativa</div>
        <div class="freq-display-code" id="display-freq">—</div>
        <div class="wait-pulse">
          <div class="pulse-dot"></div>
          Aguardando conexão
        </div>
      </div>
    </div>
    <div class="waveform" id="waveform"></div>
    <div style="text-align:center">
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.15em;margin-bottom:14px">
        Abra no outro dispositivo com o mesmo código
      </div>
      <button class="cancel-btn" onclick="cancelWait()">✕ &nbsp; Cancelar</button>
    </div>
  </div>
</div>

<!-- TELA 3 -->
<div class="screen hidden" id="screen-chat">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="conn-avatar">👁️</div>
      <div class="header-info">
        <div class="chat-freq-label" id="chat-freq-label">#000</div>
        <div class="chat-status-badge">● Online</div>
      </div>
    </div>
    <button class="disconnect-btn" onclick="disconnect()">✕ Sair</button>
  </div>
  <div class="messages-area" id="messages-area">
    <div class="empty-chat" id="empty-chat">
      <div class="icon">👁️</div>
      <p>Mensagens não são salvas</p>
    </div>
  </div>
  <div class="input-area">
    <input type="text" id="msg-input" placeholder="Mensagem..." maxlength="2000" autocomplete="off" onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="btn-send" onclick="sendMsg()" title="Enviar">➤</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let peer=null,conn=null,myRole=null,currentFreq='';
const $=id=>document.getElementById(id);

(function(){
  const wrap=$('orb-particles');
  if(!wrap)return;
  for(let i=0;i<8;i++){
    const p=document.createElement('div');
    p.className='particle';
    const angle=Math.random()*360,dist=40+Math.random()*30,rad=angle*Math.PI/180;
    const sx=70+Math.cos(rad)*dist,sy=70+Math.sin(rad)*dist;
    const ex=sx+(Math.random()-0.5)*60,ey=sy-30-Math.random()*40;
    p.style.cssText=`left:${sx}px;top:${sy}px;--sx:0px;--sy:0px;--ex:${ex-sx}px;--ey:${ey-sy}px;--d:${3+Math.random()*3}s;--dl:${Math.random()*3}s`;
    wrap.appendChild(p);
  }
})();

function showScreen(id){['screen-enter','screen-wait','screen-chat'].forEach(s=>$(s).classList.toggle('hidden',s!==id));}
function showToast(msg,isError=false){const t=$('toast');t.textContent=msg;t.className='toast'+(isError?' error-toast':'');void t.offsetWidth;t.classList.add('show');clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('show'),3200);}
function setStatus(msg,cls=''){const s=$('status-msg');s.textContent=msg;s.className='status-msg '+cls;}
function buildWaveform(){const wf=$('waveform');wf.innerHTML='';for(let i=0;i<26;i++){const b=document.createElement('div');b.className='wave-bar';b.style.cssText=`--min-h:${4+Math.random()*8}px;--max-h:${16+Math.random()*28}px;--d:${(.5+Math.random()*.9).toFixed(2)}s;animation-delay:${(Math.random()*.6).toFixed(2)}s`;wf.appendChild(b);}}
function formatTime(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}

function connect(){
  const raw=$('freq-input').value.trim();
  if(!raw){setStatus('Insira uma chave','error');return;}
  currentFreq=raw.toUpperCase();
  const peerId='chatrem-v1-'+currentFreq;
  setStatus('Iniciando...','info');
  if(peer){peer.destroy();peer=null;}
  peer=new Peer(peerId,{debug:0});
  peer.on('open',()=>{
    myRole='host';
    $('display-freq').textContent='#'+currentFreq;
    $('chat-freq-label').textContent='#'+currentFreq;
    buildWaveform();showScreen('screen-wait');
    peer.on('connection',ic=>{conn=ic;setupConnection();});
  });
  peer.on('error',err=>{
    if(err.type==='unavailable-id'){peer.destroy();peer=null;joinAsGuest(peerId);}
    else setStatus('Erro: '+err.message,'error');
  });
}

function joinAsGuest(hostId){
  myRole='guest';
  peer=new Peer(undefined,{debug:0});
  peer.on('open',()=>{
    setStatus('Conectando...','info');
    conn=peer.connect(hostId,{reliable:true});
    conn.on('open',()=>{$('chat-freq-label').textContent='#'+currentFreq;setupConnection();});
    conn.on('error',()=>setStatus('Falha na conexão','error'));
  });
  peer.on('error',e=>setStatus('Erro de rede: '+e.message,'error'));
}

function setupConnection(){
  showScreen('screen-chat');showToast('Canal aberto!');$('msg-input').focus();
  conn.on('data',data=>appendMsg(data,'theirs'));
  conn.on('close',()=>{showToast('Conexão encerrada',true);appendSystemMsg('— CONEXÃO ENCERRADA —');});
}

function sendMsg(){
  const inp=$('msg-input'),text=inp.value.trim();
  if(!text||!conn||!conn.open)return;
  conn.send(text);appendMsg(text,'mine');inp.value='';inp.focus();
}

function appendMsg(text,type){
  const area=$('messages-area'),empty=$('empty-chat');
  if(empty)empty.remove();
  const wrap=document.createElement('div');wrap.className='msg-wrap '+type;
  const meta=document.createElement('div');meta.className='msg-meta';meta.textContent=type==='mine'?'Você':'Outro';
  const bubble=document.createElement('div');bubble.className='msg-bubble';bubble.textContent=text;
  const time=document.createElement('div');time.className='msg-time';time.textContent=formatTime();
  wrap.appendChild(meta);wrap.appendChild(bubble);wrap.appendChild(time);
  area.appendChild(wrap);area.scrollTop=area.scrollHeight;
}

function appendSystemMsg(text){
  const area=$('messages-area'),div=document.createElement('div');
  div.className='sys-msg';div.textContent=text;area.appendChild(div);area.scrollTop=area.scrollHeight;
}

function cancelWait(){if(peer){peer.destroy();peer=null;}showScreen('screen-enter');setStatus('');}

function disconnect(){
  if(conn){conn.close();conn=null;}if(peer){peer.destroy();peer=null;}
  showScreen('screen-enter');
  $('messages-area').innerHTML='<div class="empty-chat" id="empty-chat"><div class="icon">👁️</div><p>Mensagens não são salvas</p></div>';
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!$('screen-enter').classList.contains('hidden'))connect();});
window.addEventListener('load',()=>{$('freq-input').focus();buildWaveform();});
</script>
</body>
</html>
