        .photo-container { 
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            border: 2px solid #fff; 
            overflow: hidden; 
            margin-bottom: 25px; 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); 
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
        }

        /* Ajuste para a imagem carregar corretamente */

            object-fit: cover; 
        }

        h1 { font-size: 26px; color: #fff; margin: 0; letter-spacing: 5px; text-transform: uppercase; font-weight: 300; }

            font-family: monospace;

            padding: 12px 20px;

            backdrop-filter: blur(5px);

        }
        
        #user-ip { font-weight: bold; color: #fff; text-shadow: 0 0 5px #fff; }

        .button-container { width: 100%; max-width: 350px; }
        
        .btn { 
            background-color: #0d0d0d; 
            border: 1px solid #222; 
            color: #fff; 
            text-decoration: none; 
            display: block; 
            padding: 18px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            text-align: center; 
            font-weight: bold; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            letter-spacing: 1px;
        }
        .btn:hover { 
            border-color: #fff; 
            background-color: #fff; 
            color: #000;
            transform: translateY(-3px); 
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2);
        }

        .footer-tag { font-size: 10px; color: #333; margin-top: auto; font-family: monospace; letter-spacing: 2px; }

    <script>
        // Velocidade 1ms para o Glitch
        const chars = 'ABCDEF0123456789X';
        const glitchElement = document.getElementById('glitch');
        
        setInterval(() => {
            let result = '';
            for (let i = 0; i < 10; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            glitchElement.innerText = result;
        }, 1); 

        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('user-ip').innerText = data.ip;
            } catch (e) {
                document.getElementById('user-ip').innerText = "PROTEGIDO";
            }
        }
        window.onload = getIP;
    </script>
</body>
